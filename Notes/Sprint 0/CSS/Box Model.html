<!DOCTYPE html>
<html>
<head>
  <style>
    .demo {
      width: 100px;
      background: lightblue;
      margin: 20px;
      padding: 20px;
      border: 5px solid blue;
      outline: 3px dashed red;
      outline-offset: 5px;
    }

    .columns {
  column-count: 5;
  column-gap: 20px;
  column-rule: 2px solid gray;
  width: 500px;
  margin-top: 50px;
}
  </style>
</head>
<body>

<h2>CSS Box Model Practice</h2>

<div class="demo">This is a box</div>

<button onclick="hide()">Display None</button>
<button onclick="invisible()">Visibility Hidden</button>

<div id="test-box" style="width:200px;height:100px;background:orange;margin:20px;"></div>

<script>
function hide() {
  document.getElementById('test-box').style.display = 'none';
}

function invisible() {
  document.getElementById('test-box').style.visibility = 'hidden';
}
</script>

</body>
</html>
